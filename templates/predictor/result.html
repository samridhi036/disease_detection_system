<!DOCTYPE html>
<html>
<head>
    <title>Result</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">🩺 Gastro AI</a>
    </div>
</nav>

<div class="container mt-5">

    <div class="card shadow border-0 text-center p-4">

        <h2 class="text-success">Prediction Result</h2>

        <div class="mt-3">
            <span class="badge bg-danger fs-5 p-3">
                {{ disease }}
            </span>
        </div>

        <h5 class="mt-3 text-muted">
            Confidence: <strong>{{ probability }}%</strong>
        </h5>

        <div class="progress mt-3" style="height: 25px;">
            <div class="progress-bar bg-success" style="width: {{ probability }}%">
                {{ probability }}%
            </div>
        </div>

        <a href="/" class="btn btn-primary mt-4">🔁 Try Again</a>

    </div>

</div>

</body>
</html>
