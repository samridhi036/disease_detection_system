{% load static %}

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GastroPredict — Disease Prediction System{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'predictor/css/style.css' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="{% url 'index' %}" class="nav-logo">
                <span class="logo-icon">🩺</span>
                <span class="logo-text">GastroPredict</span>
            </a>
            <div class="nav-links">
                <a href="{% url 'index' %}" class="nav-link {% if request.resolver_match.url_name == 'index' %}active{% endif %}">Home</a>
                <a href="{% url 'history' %}" class="nav-link {% if request.resolver_match.url_name == 'history' %}active{% endif %}">📋 History</a>
                <a href="{% url 'about' %}" class="nav-link {% if request.resolver_match.url_name == 'about' %}active{% endif %}">About</a>
            </div>
        </div>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="footer-container">
<!--            <p class="footer-text">-->
<!--                ⚠️ <strong>Disclaimer:</strong> This tool is for educational purposes only and does not replace professional medical advice. Always consult a qualified healthcare provider for diagnosis and treatment.-->
<!--            </p>-->
            <p class="footer-copy">&copy; 2026 Gastro Disease Prediction — by Samridhi Adhikari</p>
        </div>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
